services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: spassu
      POSTGRES_USER: spassu
      POSTGRES_PASSWORD: spassu
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spassu"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: django-insecure-dev-key-change-in-production
      DEBUG: "True"
      DB_HOST: db
      DB_NAME: spassu
      DB_USER: spassu
      DB_PASSWORD: spassu
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api
    depends_on:
      - backend

volumes:
  postgres_data:
